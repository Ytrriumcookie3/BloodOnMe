      </div>
    </nav>

            <img

              alt="Pantalon velours nuit vue detail"
              loading="lazy"
            />
          </a>
          <div class="product-meta">

        <article class="product-card">
          <a href="#" class="product-media" aria-label="T-shirt raye cobalt ambre">

    </section>

    <section class="feature-cover-section" aria-label="Campagne Blood On Me"></section>

    <footer class="site-footer" aria-label="Pied de page">
      <div class="site-footer__inner">
        <div class="site-footer__group site-footer__group--left">
          <a href="#" class="site-footer__link">Condition</a>
          <a href="#" class="site-footer__link">Confidentialite</a>
        </div>

        <div class="site-footer__group site-footer__group--center" aria-label="Reseaux sociaux">
          <a href="#" class="site-footer__social" aria-label="YouTube">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="2.5" y="4.5" width="19" height="15" rx="4" fill="none" stroke="currentColor" stroke-width="1.8" />
              <path d="M10 9 15 12 10 15Z" fill="currentColor" />
            </svg>
          </a>
          <a href="#" class="site-footer__social" aria-label="Instagram">

            </svg>

            <svg viewBox="0 0 24 24" aria-hidden="true">

            </svg>
          </a>
        </div>

        <div class="site-footer__group site-footer__group--right">
          <a href="#" class="site-footer__link">Contact</a>
        </div>
      </div>
    </footer>

    <aside class="cookie-banner" id="cookieBanner" role="dialog" aria-live="polite" aria-label="Préférences cookies">
      <div class="cookie-banner__content">
        <p class="cookie-banner__text">
          UTILISATIONS DES COOKIES POUR AMÉLIORER VOTRE EXPÉRIENCE DE NAVIGATION ET ANALYSER NOTRE TRAFIC.
        </p>
        <div class="cookie-banner__actions">
          <button class="cookie-btn cookie-btn--accept" id="acceptCookies" type="button">ACCEPTER</button>
          <button class="cookie-btn cookie-btn--reject" id="rejectCookies" type="button">REJETER</button>
        </div>
      </div>
    </aside>

    <script>
      const header = document.querySelector(".header-shell");
      const cookieBanner = document.querySelector("#cookieBanner");
      const acceptCookiesBtn = document.querySelector("#acceptCookies");
      const rejectCookiesBtn = document.querySelector("#rejectCookies");
      const consentStorageKey = "bloodonme-cookie-consent";
      const urlParams = new URLSearchParams(window.location.search);

      const updateHeaderState = () => {
        if (window.scrollY > 8) {
          header.classList.add("is-scrolled");
        } else {
          header.classList.remove("is-scrolled");
        }
      };

      updateHeaderState();
      window.addEventListener("scroll", updateHeaderState, { passive: true });

      const hideCookieBanner = (choice) => {
        localStorage.setItem(consentStorageKey, choice);
        cookieBanner.classList.add("cookie-banner--hidden");
      };

      if (urlParams.get("cookies") === "reset") {
        localStorage.removeItem(consentStorageKey);
      }

      const savedChoice = localStorage.getItem(consentStorageKey);

      if (
        urlParams.get("cookies") !== "show" &&
        (savedChoice === "accepted" || savedChoice === "rejected")
      ) {
        cookieBanner.classList.add("cookie-banner--hidden");
      }

      acceptCookiesBtn.addEventListener("click", () => hideCookieBanner("accepted"));
      rejectCookiesBtn.addEventListener("click", () => hideCookieBanner("rejected"));
    </script>
  </body>
</html>
